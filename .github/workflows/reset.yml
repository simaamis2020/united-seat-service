name: Reset Demo Environment

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Stop app on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 100.53.12.150
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl disable seatapp
            sudo systemctl stop seatapp
            pkill -f "python3 app.py" || true
            sleep 1
            echo "App stopped and disabled"
