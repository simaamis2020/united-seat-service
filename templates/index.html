<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>United — Select Your Seat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header class="header">
    <h1>✈ United Airlines</h1>
    <span class="flight-info">Flight UA 456 &nbsp;|&nbsp; SFO → ORD &nbsp;|&nbsp; Select Your Seat</span>
  </header>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#c9a84c;"></div>
      <span>Polaris Business</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#3b82f6;"></div>
      <span>Economy Plus</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#22c55e;"></div>
      <span>Available</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#e5e7eb;"></div>
      <span>Taken</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#003087;"></div>
      <span>Selected</span>
    </div>
  </div>

  <div class="container">

    <div class="seat-map-container">
      <h2>Seat Map</h2>

      <div class="seat-headers">
        <div class="row-number-header"></div>
        <div class="seat-header">A</div>
        <div class="seat-header">B</div>
        <div class="seat-header">C</div>
        <div class="aisle"></div>
        <div class="seat-header">D</div>
        <div class="seat-header">E</div>
        <div class="seat-header">F</div>
      </div>

      <div class="cabin-label polaris">Polaris Business</div>

      <div class="row">
        <div class="row-number">1</div>
        <button class="seat polaris available">1A</button>
        <button class="seat polaris available">1B</button>
        <button class="seat polaris taken">1C</button>
        <div class="aisle"></div>
        <button class="seat polaris taken">1D</button>
        <button class="seat polaris available">1E</button>
        <button class="seat polaris available">1F</button>
      </div>
      <div class="row">
        <div class="row-number">2</div>
        <button class="seat polaris available">2A</button>
        <button class="seat polaris taken">2B</button>
        <button class="seat polaris available">2C</button>
        <div class="aisle"></div>
        <button class="seat polaris available">2D</button>
        <button class="seat polaris taken">2E</button>
        <button class="seat polaris available">2F</button>
      </div>

      <div class="cabin-label economy-plus">Economy Plus</div>

      <div class="row">
        <div class="row-number">10</div>
        <button class="seat economy-plus available">10A</button>
        <button class="seat economy-plus available">10B</button>
        <button class="seat economy-plus taken">10C</button>
        <div class="aisle"></div>
        <button class="seat economy-plus taken">10D</button>
        <button class="seat economy-plus available">10E</button>
        <button class="seat economy-plus available">10F</button>
      </div>
      <div class="row">
        <div class="row-number">11</div>
        <button class="seat economy-plus taken">11A</button>
        <button class="seat economy-plus available">11B</button>
        <button class="seat economy-plus available">11C</button>
        <div class="aisle"></div>
        <button class="seat economy-plus available">11D</button>
        <button class="seat economy-plus taken">11E</button>
        <button class="seat economy-plus available">11F</button>
      </div>

      <div class="cabin-label economy">Economy</div>

      <div class="row">
        <div class="row-number">20</div>
        <button class="seat economy available">20A</button>
        <button class="seat economy available">20B</button>
        <button class="seat economy taken">20C</button>
        <div class="aisle"></div>
        <button class="seat economy available">20D</button>
        <button class="seat economy taken">20E</button>
        <button class="seat economy available">20F</button>
      </div>
      <div class="row">
        <div class="row-number">21</div>
        <button class="seat economy taken">21A</button>
        <button class="seat economy available">21B</button>
        <button class="seat economy available">21C</button>
        <div class="aisle"></div>
        <button class="seat economy taken">21D</button>
        <button class="seat economy available">21E</button>
        <button class="seat economy available">21F</button>
      </div>
      <div class="row">
        <div class="row-number">22</div>
        <button class="seat economy available">22A</button>
        <button class="seat economy taken">22B</button>
        <button class="seat economy available">22C</button>
        <div class="aisle"></div>
        <button class="seat economy available">22D</button>
        <button class="seat economy available">22E</button>
        <button class="seat economy taken">22F</button>
      </div>

    </div>

    <div class="confirmation-panel">
      <h2>Your Selection</h2>
      <div class="no-selection">
        <div class="icon">💺</div>
        <p>No seat selected.<br>Click a seat on the map to get started.</p>
      </div>
    </div>

  </div>

</body>
</html>
